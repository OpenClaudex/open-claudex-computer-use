name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: MCP smoke
        run: python3 scripts/smoke-mcp.py

      - name: Build release
        run: swift build -c release
